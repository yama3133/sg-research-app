<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="-apple-system,'Helvetica Neue','Hiragino Sans',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="browser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="vercel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232f3e"/>
      <stop offset="1" stop-color="#161f2e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="80" font-size="44" font-weight="700" fill="#0f172a">🇸🇬 SG Research のアーキテクチャ</text>
  <text x="60" y="120" font-size="22" fill="#475569">Tavily Search + Amazon Bedrock (Claude Sonnet 4.6) を SSE ストリーミングで繋ぐ</text>

  <!-- Browser -->
  <g transform="translate(80,200)">
    <rect width="320" height="280" rx="20" fill="url(#browser)" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="320" height="46" rx="20" fill="#e2e8f0"/>
    <rect y="26" width="320" height="20" fill="#e2e8f0"/>
    <circle cx="22" cy="23" r="6" fill="#fca5a5"/>
    <circle cx="42" cy="23" r="6" fill="#fde68a"/>
    <circle cx="62" cy="23" r="6" fill="#86efac"/>
    <text x="160" y="100" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ブラウザ</text>
    <text x="160" y="132" text-anchor="middle" font-size="16" fill="#64748b">iPhone / PC</text>
    <text x="160" y="180" text-anchor="middle" font-size="14" fill="#334155">・プリセット 12 種</text>
    <text x="160" y="204" text-anchor="middle" font-size="14" fill="#334155">・自由入力検索</text>
    <text x="160" y="228" text-anchor="middle" font-size="14" fill="#334155">・Thinking / 分析を逐次表示</text>
    <text x="160" y="252" text-anchor="middle" font-size="14" fill="#334155">・日英切替 (JP / EN)</text>
  </g>

  <!-- Vercel (Next.js) -->
  <g transform="translate(560,180)">
    <rect width="460" height="640" rx="22" fill="url(#vercel)" stroke="#334155" stroke-width="2"/>
    <text x="230" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">Vercel — Next.js 16</text>
    <text x="230" y="76" text-anchor="middle" font-size="14" fill="#94a3b8">App Router / Route Handlers</text>

    <!-- search route -->
    <g transform="translate(40,120)">
      <rect width="380" height="200" rx="14" fill="#1e293b" stroke="#475569"/>
      <text x="20" y="36" font-size="18" font-weight="700" fill="#7dd3fc">POST /api/search</text>
      <text x="20" y="68" font-size="13" fill="#cbd5e1">1. Tavily Search を実行</text>
      <text x="20" y="92" font-size="13" fill="#cbd5e1">2. 上位 10 件の結果を取得</text>
      <text x="20" y="116" font-size="13" fill="#cbd5e1">3. JP モードのみ Bedrock で</text>
      <text x="38" y="138" font-size="13" fill="#cbd5e1">英文 answer を和訳</text>
      <text x="20" y="170" font-size="12" fill="#94a3b8">→ JSON で結果＋和訳を返却</text>
    </g>

    <!-- analyze route -->
    <g transform="translate(40,350)">
      <rect width="380" height="240" rx="14" fill="#1e293b" stroke="#475569"/>
      <text x="20" y="36" font-size="18" font-weight="700" fill="#fcd34d">POST /api/analyze (SSE)</text>
      <text x="20" y="68" font-size="13" fill="#cbd5e1">1. 検索結果 10 件を Claude に送信</text>
      <text x="20" y="92" font-size="13" fill="#cbd5e1">2. ConverseStream を起動</text>
      <text x="20" y="116" font-size="13" fill="#cbd5e1">3. extended thinking を有効化</text>
      <text x="20" y="148" font-size="13" fill="#fbbf24">→ event: thinking (逐次)</text>
      <text x="20" y="172" font-size="13" fill="#86efac">→ event: text (分析を逐次)</text>
      <text x="20" y="196" font-size="13" fill="#94a3b8">→ event: done</text>
    </g>
  </g>

  <!-- Tavily -->
  <g transform="translate(1180,200)">
    <rect width="340" height="170" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="170" y="56" text-anchor="middle" font-size="22" font-weight="700" fill="#15803d">Tavily Search API</text>
    <text x="170" y="92" text-anchor="middle" font-size="14" fill="#166534">api.tavily.com/search</text>
    <text x="170" y="124" text-anchor="middle" font-size="13" fill="#166534">advanced 検索 / include_answer</text>
    <text x="170" y="148" text-anchor="middle" font-size="13" fill="#166534">10 件のソース + AI 要約</text>
  </g>

  <!-- AWS Bedrock -->
  <g transform="translate(1180,440)">
    <rect width="340" height="380" rx="20" fill="url(#aws)" stroke="#FF9900" stroke-width="2"/>
    <text x="170" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#FF9900">Amazon Bedrock</text>
    <text x="170" y="70" text-anchor="middle" font-size="13" fill="#cbd5e1">us-east-1</text>

    <g transform="translate(20,100)">
      <rect width="300" height="110" rx="12" fill="#0f172a" stroke="#475569"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">Converse</text>
      <text x="150" y="58" text-anchor="middle" font-size="12" fill="#cbd5e1">Claude Sonnet 4.6</text>
      <text x="150" y="80" text-anchor="middle" font-size="12" fill="#94a3b8">英文 answer → 日本語要約</text>
      <text x="150" y="98" text-anchor="middle" font-size="12" fill="#94a3b8">JP モードのみ</text>
    </g>

    <g transform="translate(20,230)">
      <rect width="300" height="130" rx="12" fill="#0f172a" stroke="#475569"/>
      <text x="150" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#7dd3fc">ConverseStream</text>
      <text x="150" y="58" text-anchor="middle" font-size="12" fill="#cbd5e1">Claude Sonnet 4.6</text>
      <text x="150" y="80" text-anchor="middle" font-size="12" fill="#94a3b8">Extended Thinking</text>
      <text x="150" y="98" text-anchor="middle" font-size="12" fill="#94a3b8">budget_tokens: 3000</text>
      <text x="150" y="116" text-anchor="middle" font-size="12" fill="#94a3b8">10 件結果 → 日/英 分析</text>
    </g>
  </g>

  <!-- Arrows: browser <-> next -->
  <line x1="400" y1="290" x2="560" y2="290" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="278" text-anchor="middle" font-size="13" fill="#0284c7">POST /api/search</text>
  <line x1="560" y1="340" x2="400" y2="340" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="358" text-anchor="middle" font-size="13" fill="#0284c7">JSON</text>

  <line x1="400" y1="540" x2="560" y2="540" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-amber)"/>
  <text x="480" y="528" text-anchor="middle" font-size="13" fill="#d97706">POST /api/analyze</text>
  <line x1="560" y1="600" x2="400" y2="600" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-amber)"/>
  <text x="480" y="618" text-anchor="middle" font-size="13" fill="#d97706">Server-Sent Events</text>

  <!-- Arrows: next <-> tavily -->
  <line x1="1020" y1="270" x2="1180" y2="280" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1100" y="256" text-anchor="middle" font-size="13" fill="#16a34a">search</text>

  <!-- Arrows: next <-> bedrock -->
  <line x1="1020" y1="540" x2="1180" y2="540" stroke="#FF9900" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1100" y="528" text-anchor="middle" font-size="13" fill="#b45309">Converse / Stream</text>

  <!-- Footer -->
  <text x="800" y="950" text-anchor="middle" font-size="14" fill="#64748b">
    https://sg-research-app.vercel.app  ·  https://github.com/yama3133/sg-research-app
  </text>
</svg>
